server.port=8080
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS - allow frontend to talk to backend
exam.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500

# Exam config defaults
exam.default.question-count=10
exam.default.duration-seconds=60

# CSV data files location (relative to classpath or absolute)
exam.data.users-file=data/users.csv
exam.data.questions-file=data/questions.csv

# ── Email / SMTP Configuration ──────────────────────────────────────────
# Uncomment and fill in to enable result email summaries.
# Testify uses Spring Mail — works with any SMTP provider (Gmail, Outlook, etc.)
#
# Gmail example (use an App Password, not your real password):
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=you@gmail.com
# spring.mail.password=your_app_password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true
#
# Outlook/Office365 example:
# spring.mail.host=smtp.office365.com
# spring.mail.port=587
# spring.mail.username=you@outlook.com
# spring.mail.password=your_password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true
#
# If no mail config is set, Testify silently skips sending emails.
