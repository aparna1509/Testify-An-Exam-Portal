<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testify — Dashboard</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .page { padding: 2rem 0 4rem; }

    .welcome-banner {
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-3) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem 2.5rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      flex-wrap: wrap;
      position: relative;
      overflow: hidden;
    }

    .welcome-banner::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--amber-glow) 0%, transparent 70%);
      pointer-events: none;
    }

    .welcome-banner h2 { font-size: 1.6rem; margin-bottom: 0.25rem; }
    .welcome-banner p  { font-size: 0.85rem; font-family: var(--font-mono); color: var(--text-3); }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .stat-card__label { font-size: 0.75rem; font-family: var(--font-mono); color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-card__value { font-size: 1.6rem; font-family: var(--font-display); color: var(--text-1); }
    .stat-card__value.amber { color: var(--amber); }
    .stat-card__value.green { color: var(--green); }

    .section-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 700px) { .section-grid { grid-template-columns: 1fr; } }

    .section-title {
      font-size: 0.8rem;
      font-family: var(--font-mono);
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .exam-cta {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 1.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .exam-cta--attempted {
      border-color: rgba(74,222,128,0.2);
      background: linear-gradient(135deg, var(--bg-card) 0%, rgba(74,222,128,0.04) 100%);
    }

    .exam-cta--available {
      border-color: var(--amber-dim);
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--amber-subtle) 100%);
    }

    .exam-cta__icon { font-size: 2.5rem; margin-bottom: 0.75rem; display: block; }
    .exam-cta h3   { margin-bottom: 0.5rem; }
    .exam-cta p    { font-size: 0.875rem; margin-bottom: 1.25rem; }

    /* Countdown ring */
    .exam-timer-preview {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--amber);
      background: var(--amber-glow);
      padding: 0.3rem 0.75rem;
      border-radius: 100px;
      border: 1px solid rgba(245,166,35,0.2);
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="page container container--wide">

    <!-- Welcome Banner -->
    <div class="welcome-banner fade-in" id="welcome-banner">
      <div>
        <h2 id="welcome-name">Welcome back!</h2>
        <p id="welcome-meta">—</p>
      </div>
      <div style="display:flex; gap:0.75rem; flex-wrap:wrap;">
        <span class="badge" id="role-badge"></span>
      </div>
    </div>

    <!-- Stats Row -->
    <div class="stats-grid fade-in">
      <div class="stat-card">
        <span class="stat-card__label">Status</span>
        <span class="stat-card__value" id="stat-status">—</span>
      </div>
      <div class="stat-card">
        <span class="stat-card__label">Exam Duration</span>
        <span class="stat-card__value amber" id="stat-duration">—</span>
      </div>
      <div class="stat-card">
        <span class="stat-card__label">Questions</span>
        <span class="stat-card__value" id="stat-qcount">—</span>
      </div>
    </div>

    <!-- Exam CTA -->
    <div id="exam-cta-wrap"></div>

    <!-- Profile & Password -->
    <div class="section-grid">

      <!-- Profile Card -->
      <div class="card fade-in">
        <div class="section-title">Update Profile</div>
        <div id="profile-alert"></div>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="profile-name" placeholder="Your name" />
        </div>
        <button class="btn btn--primary" onclick="updateProfile()">Save Changes</button>
      </div>

      <!-- Password Card -->
      <div class="card fade-in">
        <div class="section-title">Change Password</div>
        <div id="pwd-alert"></div>
        <div class="form-group">
          <label>Current Password</label>
          <input type="password" id="old-pwd" placeholder="Current password" />
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="new-pwd" placeholder="New password" />
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" id="new-pwd2" placeholder="Repeat new password" />
        </div>
        <button class="btn btn--secondary" onclick="changePassword()">Update Password</button>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script>
    const user = Session.require();
    if (!user) throw new Error('redirect');

    renderNavbar(user);

    // ── Populate welcome ──
    document.getElementById('welcome-name').textContent = `Welcome back, ${user.name}!`;
    document.getElementById('welcome-meta').textContent = `User ID: ${user.userId}`;
    document.getElementById('role-badge').textContent = user.role;
    document.getElementById('role-badge').className = `badge badge--${user.role.toLowerCase()}`;
    document.getElementById('profile-name').value = user.name;

    // ── Load exam config ──
    async function loadConfig() {
      try {
        const cfg = await Api.get('/exam/config');
        const mins = Math.floor(cfg.durationSeconds / 60);
        const secs = cfg.durationSeconds % 60;
        document.getElementById('stat-duration').textContent =
          mins > 0 ? `${mins}m ${secs > 0 ? secs + 's' : ''}` : `${cfg.durationSeconds}s`;
        document.getElementById('stat-qcount').textContent = cfg.questionCount;
      } catch { /* backend may not be running */ }
    }

    // ── Refresh exam attempted status ──
    async function refreshUserStatus() {
      try {
        const data = await Api.get(`/user/${user.userId}/profile`);
        if (data.success) {
          user.examAttempted = data.examAttempted;
          Session.set(user);
        }
      } catch {}
      renderExamCTA();
    }

    function renderExamCTA() {
      const wrap = document.getElementById('exam-cta-wrap');
      const attempted = user.examAttempted;

      document.getElementById('stat-status').textContent = attempted ? 'Completed' : 'Pending';
      document.getElementById('stat-status').className   = `stat-card__value ${attempted ? 'green' : 'amber'}`;

      if (attempted) {
        wrap.innerHTML = `
          <div class="exam-cta exam-cta--attempted fade-in">
            <span class="exam-cta__icon">✅</span>
            <h3>Exam Completed</h3>
            <p>You have already submitted this exam. Contact your administrator to reset your attempt.</p>
            <span class="badge badge--done">Submitted</span>
          </div>`;
      } else {
        wrap.innerHTML = `
          <div class="exam-cta exam-cta--available fade-in">
            <span class="exam-cta__icon">📋</span>
            <h3>Exam Ready</h3>
            <div class="exam-timer-preview">⏱ Timed Exam — once started, cannot be paused</div>
            <p>You have <strong>one attempt</strong>. Read each question carefully before answering.</p>
            <a class="btn btn--primary btn--lg" href="exam.html">Start Exam →</a>
          </div>`;
      }
    }

    // ── Profile update ──
    async function updateProfile() {
      const name = document.getElementById('profile-name').value.trim();
      if (!name) { showAlert('profile-alert', 'Name cannot be empty.'); return; }
      try {
        const data = await Api.put(`/user/${user.userId}/profile`, { name });
        if (data.success) {
          user.name = name;
          Session.set(user);
          document.getElementById('welcome-name').textContent = `Welcome back, ${name}!`;
          renderNavbar(user);
          showAlert('profile-alert', 'Profile updated!', 'success');
        } else {
          showAlert('profile-alert', data.message);
        }
      } catch { showAlert('profile-alert', 'Server error.'); }
    }

    // ── Password change ──
    async function changePassword() {
      const oldPwd  = document.getElementById('old-pwd').value;
      const newPwd  = document.getElementById('new-pwd').value;
      const newPwd2 = document.getElementById('new-pwd2').value;
      if (!oldPwd || !newPwd) { showAlert('pwd-alert', 'Fill in all fields.'); return; }
      if (newPwd !== newPwd2) { showAlert('pwd-alert', 'New passwords do not match.'); return; }
      if (newPwd.length < 6)  { showAlert('pwd-alert', 'Password must be at least 6 characters.'); return; }
      try {
        const data = await Api.put(`/user/${user.userId}/password`, { oldPassword: oldPwd, newPassword: newPwd });
        if (data.success) {
          showAlert('pwd-alert', 'Password changed successfully!', 'success');
          document.getElementById('old-pwd').value = '';
          document.getElementById('new-pwd').value = '';
          document.getElementById('new-pwd2').value = '';
        } else {
          showAlert('pwd-alert', data.message);
        }
      } catch { showAlert('pwd-alert', 'Server error.'); }
    }

    // Init
    loadConfig();
    refreshUserStatus();
  </script>
</body>
</html>
