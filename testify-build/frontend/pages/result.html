<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testify — Results</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .page { padding:2rem 0 5rem; }

    /* Score card */
    .score-card {
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:var(--radius-lg); padding:3rem 2rem;
      text-align:center; margin-bottom:2rem; position:relative;
      overflow:hidden; animation:fadeIn 0.5s ease both;
    }
    .score-card::before {
      content:''; position:absolute; inset:0;
      background:radial-gradient(circle at 50% 0%, var(--amber-glow) 0%, transparent 65%);
      pointer-events:none;
    }
    .score-ring { position:relative; display:inline-flex; align-items:center; justify-content:center; margin-bottom:1.5rem; }
    .score-ring svg { transform:rotate(-90deg); }
    .score-ring__text { position:absolute; text-align:center; }
    .score-ring__pct { font-family:var(--font-display); font-size:2.4rem; color:var(--text-1); display:block; line-height:1; }
    .score-ring__label { font-family:var(--font-mono); font-size:0.7rem; color:var(--text-3); text-transform:uppercase; letter-spacing:0.06em; }
    .score-card h2 { margin-bottom:0.5rem; }
    .score-card p  { margin-bottom:0.5rem; }
    .score-stats { display:flex; justify-content:center; gap:2rem; margin-top:1.5rem; padding-top:1.5rem; border-top:1px solid var(--border); flex-wrap:wrap; }
    .score-stat { text-align:center; }
    .score-stat__val { font-family:var(--font-display); font-size:1.8rem; }
    .score-stat__lbl { font-family:var(--font-mono); font-size:0.72rem; color:var(--text-3); text-transform:uppercase; }
    .score-stat--correct .score-stat__val  { color:var(--green); }
    .score-stat--wrong .score-stat__val    { color:var(--red); }
    .score-stat--skipped .score-stat__val  { color:var(--text-3); }
    .grade-badge { display:inline-block; padding:0.4rem 1.2rem; border-radius:100px; font-family:var(--font-display); font-size:1.2rem; margin-bottom:0.75rem; }

    /* ── Tabs ── */
    .result-tabs { display:flex; gap:0.25rem; border-bottom:1px solid var(--border); margin-bottom:1.5rem; }
    .result-tab {
      padding:0.65rem 1.2rem; font-size:0.85rem; font-weight:600; color:var(--text-3);
      cursor:pointer; border:none; background:none; border-bottom:2px solid transparent;
      transition:all var(--transition); font-family:var(--font-body); margin-bottom:-1px;
    }
    .result-tab:hover  { color:var(--text-2); }
    .result-tab.active { color:var(--amber); border-bottom-color:var(--amber); }

    /* Review section */
    .review-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; flex-wrap:wrap; gap:0.75rem; }
    .review-filters { display:flex; gap:0.5rem; flex-wrap:wrap; }
    .filter-btn {
      padding:0.35rem 0.85rem; border-radius:100px; font-size:0.78rem;
      font-family:var(--font-mono); border:1px solid var(--border); background:var(--bg-3);
      color:var(--text-2); cursor:pointer; transition:all var(--transition);
    }
    .filter-btn:hover, .filter-btn.active { border-color:var(--amber-dim); color:var(--amber); background:var(--amber-glow); }
    .review-list { display:flex; flex-direction:column; gap:1rem; }

    .review-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.5rem; animation:fadeIn 0.3s ease both; }
    .review-card.correct { border-left:3px solid var(--green); }
    .review-card.wrong   { border-left:3px solid var(--red); }
    .review-card.skipped { border-left:3px solid var(--border-light); }
    .review-card__header { display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; margin-bottom:1rem; }
    .review-card__q { font-weight:600; color:var(--text-1); line-height:1.5; font-size:0.95rem; }
    .review-card__num { font-family:var(--font-mono); font-size:0.72rem; color:var(--text-3); white-space:nowrap; padding-top:0.15rem; }
    .review-options { display:flex; flex-direction:column; gap:0.4rem; }
    .review-option {
      display:flex; align-items:center; gap:0.75rem; padding:0.5rem 0.75rem;
      border-radius:var(--radius); font-size:0.875rem; color:var(--text-2);
      background:var(--bg-3); border:1px solid transparent;
    }
    .review-option.correct-ans { background:var(--green-dim); border-color:rgba(74,222,128,0.2); color:var(--green); }
    .review-option.user-wrong  { background:var(--red-dim); border-color:rgba(248,113,113,0.2); color:var(--red); }
    .review-option__mark   { width:16px; height:16px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:700; }
    .review-option__letter { font-family:var(--font-mono); font-size:0.72rem; width:20px; color:var(--text-3); flex-shrink:0; }

    /* Explanation box */
    .explanation-box {
      margin-top:1rem; padding:0.85rem 1rem;
      background:rgba(96,165,250,0.07); border:1px solid rgba(96,165,250,0.2);
      border-radius:var(--radius); font-size:0.85rem; color:var(--text-2); line-height:1.6;
    }
    .explanation-box strong { color:var(--blue); font-size:0.72rem; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:0.06em; display:block; margin-bottom:0.3rem; }

    /* ── Leaderboard ── */
    .leaderboard-wrap { animation:fadeIn 0.3s ease; }
    .lb-card {
      background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg);
      overflow:hidden;
    }
    .lb-row {
      display:flex; align-items:center; gap:1rem; padding:0.9rem 1.25rem;
      border-bottom:1px solid var(--border); transition:background var(--transition);
    }
    .lb-row:last-child { border-bottom:none; }
    .lb-row:hover { background:var(--bg-3); }
    .lb-row.lb-row--me { background:var(--amber-subtle); border-left:3px solid var(--amber); }
    .lb-rank { font-family:var(--font-display); font-size:1.3rem; width:36px; flex-shrink:0; text-align:center; }
    .lb-rank.gold   { color:#ffd700; }
    .lb-rank.silver { color:#c0c0c0; }
    .lb-rank.bronze { color:#cd7f32; }
    .lb-name { flex:1; font-weight:600; color:var(--text-1); font-size:0.9rem; }
    .lb-name small { display:block; font-family:var(--font-mono); font-size:0.68rem; color:var(--text-3); font-weight:400; }
    .lb-score { font-family:var(--font-display); font-size:1.1rem; color:var(--amber); min-width:50px; text-align:right; }
    .lb-pct { font-family:var(--font-mono); font-size:0.72rem; color:var(--text-3); min-width:40px; text-align:right; }
    .lb-bar-wrap { width:80px; height:6px; background:var(--bg-3); border-radius:100px; overflow:hidden; }
    .lb-bar { height:100%; border-radius:100px; background:var(--amber); transition:width 0.8s ease; }

    .lb-empty { text-align:center; padding:3rem; color:var(--text-3); font-family:var(--font-mono); font-size:0.85rem; }

    @media (max-width: 600px) {
      .score-card { padding:1.5rem 1rem; }
      .score-stats { gap:1rem; }
      .lb-row { flex-wrap:wrap; gap:0.4rem; }
      .lb-bar-wrap { display:none; }
    }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="page container" id="page-content">
    <div class="loading-state" style="text-align:center;padding:4rem 0;">
      <div class="spinner" style="width:32px;height:32px;border-width:3px;"></div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script>
    const user = Session.require();
    if (!user) throw new Error('redirect');
    renderNavbar(user);

    const resultRaw = sessionStorage.getItem('ep_result');
    if (!resultRaw) { location.href = 'dashboard.html'; }
    const result = JSON.parse(resultRaw);
    const { score, total, questionResults, passThreshold, passed } = result;
    const pct = Math.round((score / total) * 100);
    const threshold = passThreshold ?? 60;
    const isPassed  = passed ?? (pct >= threshold);

    function getGrade(p) {
      if (p >= 90) return { label:'Excellent', color:'var(--green)', bg:'var(--green-dim)' };
      if (p >= 75) return { label:'Good',      color:'var(--blue)',  bg:'var(--blue-dim)'  };
      if (p >= 50) return { label:'Average',   color:'var(--amber)', bg:'var(--amber-glow)' };
      return             { label:'Poor',       color:'var(--red)',   bg:'var(--red-dim)'   };
    }
    const grade = getGrade(pct);
    const correct = questionResults.filter(r => r.correct).length;
    const wrong   = questionResults.filter(r => !r.correct && r.userAnswer > 0).length;
    const skipped = questionResults.filter(r => r.userAnswer <= 0).length;

    const radius = 70;
    const circ   = 2 * Math.PI * radius;
    const dash   = (pct / 100) * circ;
    const letters = ['A','B','C','D'];

    // ── Score Card HTML ──
    function scoreCardHTML() {
      return `
        <div class="score-card">
          <div class="score-ring">
            <svg width="180" height="180" viewBox="0 0 180 180">
              <circle cx="90" cy="90" r="${radius}" fill="none" stroke="var(--border)" stroke-width="10"/>
              <circle cx="90" cy="90" r="${radius}" fill="none" stroke="${grade.color}" stroke-width="10"
                stroke-dasharray="${dash} ${circ}" stroke-linecap="round"
                style="transition:stroke-dasharray 1s ease"/>
            </svg>
            <div class="score-ring__text">
              <span class="score-ring__pct">${pct}%</span>
              <span class="score-ring__label">Score</span>
            </div>
          </div>
          <div style="display:flex;justify-content:center;gap:0.75rem;flex-wrap:wrap;margin-bottom:0.75rem;">
            <div class="grade-badge" style="color:${grade.color};background:${grade.bg};border:1px solid ${grade.color}40">
              ${grade.label}
            </div>
            <div class="grade-badge" style="color:${isPassed?'var(--green)':'var(--red)'};background:${isPassed?'var(--green-dim)':'var(--red-dim)'};border:1px solid ${isPassed?'rgba(74,222,128,0.4)':'rgba(248,113,113,0.4)'};">
              ${isPassed?'✓ PASS':'✕ FAIL'} (min: ${threshold}%)
            </div>
          </div>
          <h2>${user.name}'s Result</h2>
          <p>You scored <strong style="color:var(--text-1)">${score} out of ${total}</strong> questions correctly.</p>
          <div class="score-stats">
            <div class="score-stat score-stat--correct"><div class="score-stat__val">${correct}</div><div class="score-stat__lbl">Correct</div></div>
            <div class="score-stat score-stat--wrong"><div class="score-stat__val">${wrong}</div><div class="score-stat__lbl">Wrong</div></div>
            <div class="score-stat score-stat--skipped"><div class="score-stat__val">${skipped}</div><div class="score-stat__lbl">Skipped</div></div>
          </div>
          <div style="margin-top:2rem;display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;">
            <a class="btn btn--secondary" href="dashboard.html">← Dashboard</a>
          </div>
          ${user.email ? `<p style="font-size:0.78rem;color:var(--text-3);font-family:var(--font-mono);margin-top:1rem;">📧 Result summary sent to <strong>${user.email}</strong></p>` : ''}
        </div>`;
    }

    // ── Review tab ──
    function renderReview(filter = 'all') {
      const filtered = questionResults.filter(r => {
        if (filter === 'correct') return r.correct;
        if (filter === 'wrong')   return !r.correct && r.userAnswer > 0;
        if (filter === 'skipped') return r.userAnswer <= 0;
        return true;
      });

      const filters = ['all','correct','wrong','skipped'];
      const counts  = { all: total, correct, wrong, skipped };

      return `
        <div class="review-header">
          <h3 style="font-family:var(--font-display)">Question Review</h3>
          <div class="review-filters">
            ${filters.map(f => `
              <button class="filter-btn ${filter===f?'active':''}" onclick="switchReviewFilter('${f}')">
                ${f.charAt(0).toUpperCase()+f.slice(1)} (${counts[f]})
              </button>`).join('')}
          </div>
        </div>
        ${filtered.length === 0
          ? `<div style="text-align:center;color:var(--text-3);font-family:var(--font-mono);padding:2rem;">No questions in this category.</div>`
          : `<div class="review-list">
              ${filtered.map(r => {
                const status = r.correct ? 'correct' : r.userAnswer > 0 ? 'wrong' : 'skipped';
                const statusLabel = r.correct ? '✓ Correct' : r.userAnswer > 0 ? '✕ Wrong' : '— Skipped';
                const statusColor = r.correct ? 'var(--green)' : r.userAnswer > 0 ? 'var(--red)' : 'var(--text-3)';
                return `
                  <div class="review-card ${status}">
                    <div class="review-card__header">
                      <div class="review-card__q">${r.questionText}</div>
                      <div class="review-card__num" style="color:${statusColor}">${statusLabel}</div>
                    </div>
                    <div class="review-options">
                      ${r.options.map((opt, i) => {
                        const optNum = i + 1;
                        const isCorrect  = optNum === r.correctAnswer;
                        const isUserWrong = optNum === r.userAnswer && !r.correct;
                        const cls  = isCorrect ? 'correct-ans' : isUserWrong ? 'user-wrong' : '';
                        const mark = isCorrect ? '✓' : isUserWrong ? '✕' : '';
                        return `<div class="review-option ${cls}">
                          <span class="review-option__letter">${letters[i]}</span>
                          <span style="flex:1">${opt}</span>
                          <span class="review-option__mark">${mark}</span>
                        </div>`;
                      }).join('')}
                    </div>
                    ${!r.correct ? `
                    <div class="explanation-box">
                      <strong>💡 Explanation</strong>
                      The correct answer is <strong style="color:var(--green)">${letters[r.correctAnswer-1]}. ${r.options[r.correctAnswer-1]}</strong>.
                      ${r.userAnswer > 0
                        ? `You selected <strong style="color:var(--red)">${letters[r.userAnswer-1]}. ${r.options[r.userAnswer-1]}</strong>.`
                        : `You skipped this question.`}
                    </div>` : ''}
                  </div>`;
              }).join('')}
            </div>`}`;
    }

    // ── Leaderboard tab ──
    let leaderboardCache = null;
    async function renderLeaderboard() {
      const wrap = document.getElementById('lb-content');
      if (!wrap) return;
      wrap.innerHTML = `<div class="lb-empty">Loading leaderboard…</div>`;
      try {
        if (!leaderboardCache) {
          leaderboardCache = await Api.get('/exam/leaderboard');
        }
        const entries = leaderboardCache;
        if (!entries || entries.length === 0) {
          wrap.innerHTML = `<div class="lb-empty">No results yet. Be the first to complete the exam!</div>`;
          return;
        }
        const maxScore = entries[0].score;
        wrap.innerHTML = `
          <div class="lb-card">
            ${entries.map((e, i) => {
              const isMe = e.userId === user.userId;
              const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
              const rankLabel = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`;
              const barW = maxScore > 0 ? Math.round((e.score / maxScore) * 100) : 0;
              const ePct = e.total > 0 ? Math.round((e.score/e.total)*100) : 0;
              return `
                <div class="lb-row ${isMe ? 'lb-row--me' : ''}">
                  <div class="lb-rank ${rankClass}">${rankLabel}</div>
                  <div class="lb-name">
                    ${e.name}${isMe ? ' <span style="color:var(--amber);font-size:0.7rem;">(you)</span>' : ''}
                    <small>${e.userId}</small>
                  </div>
                  <div class="lb-bar-wrap"><div class="lb-bar" style="width:${barW}%"></div></div>
                  <div class="lb-pct">${ePct}%</div>
                  <div class="lb-score">${e.score}/${e.total}</div>
                </div>`;
            }).join('')}
          </div>`;
      } catch {
        wrap.innerHTML = `<div class="lb-empty">Could not load leaderboard. Backend may not support it yet.</div>`;
      }
    }

    // ── Active tab state ──
    let activeTab = 'review';
    let reviewFilter = 'all';

    function switchTab(tab) {
      activeTab = tab;
      renderPage();
    }
    function switchReviewFilter(f) {
      reviewFilter = f;
      renderPage();
    }

    function renderPage() {
      const tabsHTML = `
        <div class="result-tabs">
          <button class="result-tab ${activeTab==='review'?'active':''}" onclick="switchTab('review')">📝 Question Review</button>
          <button class="result-tab ${activeTab==='leaderboard'?'active':''}" onclick="switchTab('leaderboard')">🏆 Leaderboard</button>
        </div>`;

      document.getElementById('page-content').innerHTML =
        scoreCardHTML() +
        tabsHTML +
        (activeTab === 'review'
          ? renderReview(reviewFilter)
          : `<div class="leaderboard-wrap"><div id="lb-content"><div class="lb-empty">Loading…</div></div></div>`);

      if (activeTab === 'leaderboard') renderLeaderboard();
    }

    renderPage();
  </script>
</body>
</html>
