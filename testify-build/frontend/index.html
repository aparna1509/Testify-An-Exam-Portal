<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testify — Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-wrap { width:100%; max-width:440px; padding:1.5rem; position:relative; z-index:1; animation: fadeIn 0.4s ease both; }
    .auth-logo { text-align:center; margin-bottom:2rem; }
    .auth-logo h1 { font-family:var(--font-display); font-size:2.6rem; letter-spacing:-0.02em; }
    .auth-logo h1 span { color:var(--amber); }
    .auth-logo p { font-size:0.85rem; font-family:var(--font-mono); color:var(--text-3); margin-top:0.25rem; }
    .auth-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:2rem; box-shadow:var(--shadow-lg); }
    .password-wrap { position:relative; }
    .password-wrap input { padding-right:3rem; }
    .password-toggle { position:absolute; right:0.75rem; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-3); cursor:pointer; font-size:0.85rem; font-family:var(--font-mono); transition:color var(--transition); }
    .password-toggle:hover { color:var(--text-1); }
    .footer-note { text-align:center; margin-top:1.5rem; font-size:0.8rem; color:var(--text-3); font-family:var(--font-mono); }
    .theme-toggle-corner { position:fixed; top:1rem; right:1rem; z-index:50; }
    .theme-toggle-corner .theme-toggle { background:var(--bg-card); border:1px solid var(--border); }
  </style>
</head>
<body>
  <!-- Theme toggle in corner on login page -->
  <div class="theme-toggle-corner">
    <button class="theme-toggle" onclick="Theme.toggle()" title="Toggle theme">
      <span class="theme-toggle__icon">☀️</span>
      <span class="theme-toggle__label">Light</span>
    </button>
  </div>

  <div class="auth-wrap">
    <div class="auth-logo">
      <h1>Testi<span>fy</span></h1>
      <p>An Exam Portal</p>
    </div>
    <div class="auth-card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Login</button>
        <button class="tab" onclick="switchTab('register')">Register</button>
      </div>
      <div id="login-section">
        <div id="login-alert"></div>
        <div class="form-group">
          <label>User ID</label>
          <input type="text" id="login-id" placeholder="Enter your user ID" autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="password-wrap">
            <input type="password" id="login-pwd" placeholder="Enter password" autocomplete="current-password" />
            <button class="password-toggle" onclick="togglePwd('login-pwd', this)">show</button>
          </div>
        </div>
        <button class="btn btn--primary btn--full btn--lg" onclick="doLogin()" id="login-btn">Sign In</button>
        <div class="footer-note" style="margin-top:1rem;">Default admin → <code>admin / admin123</code></div>
      </div>
      <div id="register-section" style="display:none">
        <div id="reg-alert"></div>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Your full name" />
        </div>
        <div class="form-group">
          <label>User ID</label>
          <input type="text" id="reg-id" placeholder="Choose a unique user ID" autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" />
          <small style="color:var(--text-3);font-size:0.75rem;font-family:var(--font-mono);margin-top:0.2rem;">Used to send your result summary after the exam.</small>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="password-wrap">
            <input type="password" id="reg-pwd" placeholder="Choose a password (min 6 chars)" autocomplete="new-password" />
            <button class="password-toggle" onclick="togglePwd('reg-pwd', this)">show</button>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="reg-pwd2" placeholder="Repeat password" autocomplete="new-password" />
        </div>
        <button class="btn btn--primary btn--full btn--lg" onclick="doRegister()" id="reg-btn">Create Account</button>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
  <script>
    if (Session.get()) location.href = 'pages/dashboard.html';

    // Sync theme toggle icon on load
    Theme._updateToggles(Theme.get());

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === (isLogin ? 0 : 1)));
      document.getElementById('login-section').style.display = isLogin ? '' : 'none';
      document.getElementById('register-section').style.display = isLogin ? 'none' : '';
      clearAlert('login-alert'); clearAlert('reg-alert');
    }

    function togglePwd(id, btn) {
      const el = document.getElementById(id);
      const show = el.type === 'password';
      el.type = show ? 'text' : 'password';
      btn.textContent = show ? 'hide' : 'show';
    }

    async function doLogin() {
      const userId = document.getElementById('login-id').value.trim();
      const password = document.getElementById('login-pwd').value;
      if (!userId || !password) { showAlert('login-alert', 'Please fill in all fields.'); return; }
      const btn = document.getElementById('login-btn');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Signing in…';
      try {
        const data = await Api.post('/auth/login', { userId, password });
        if (data.success) {
          Session.set({ userId: data.userId, name: data.name, role: data.role, examAttempted: data.examAttempted, email: data.email || '' });
          location.href = 'pages/dashboard.html';
        } else {
          showAlert('login-alert', data.message || 'Login failed.');
          btn.disabled = false; btn.textContent = 'Sign In';
        }
      } catch {
        showAlert('login-alert', 'Cannot reach the server. Is the backend running?');
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    }

    async function doRegister() {
      const name   = document.getElementById('reg-name').value.trim();
      const userId = document.getElementById('reg-id').value.trim();
      const email  = document.getElementById('reg-email').value.trim();
      const pwd    = document.getElementById('reg-pwd').value;
      const pwd2   = document.getElementById('reg-pwd2').value;
      if (!name || !userId || !email || !pwd) { showAlert('reg-alert', 'Please fill in all fields.'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showAlert('reg-alert', 'Please enter a valid email address.'); return; }
      if (pwd !== pwd2) { showAlert('reg-alert', 'Passwords do not match.'); return; }
      if (pwd.length < 6) { showAlert('reg-alert', 'Password must be at least 6 characters.'); return; }
      const btn = document.getElementById('reg-btn');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Creating account…';
      try {
        const data = await Api.post('/auth/register', { userId, password: pwd, name, email });
        if (data.success) {
          showAlert('reg-alert', data.message, 'success');
          setTimeout(() => switchTab('login'), 1500);
        } else {
          showAlert('reg-alert', data.message || 'Registration failed.');
        }
      } catch {
        showAlert('reg-alert', 'Cannot reach the server. Is the backend running?');
      } finally {
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const loginVisible = document.getElementById('login-section').style.display !== 'none';
      loginVisible ? doLogin() : doRegister();
    });
  </script>
</body>
</html>
